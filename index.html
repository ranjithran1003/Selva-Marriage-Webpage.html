<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="theme-color" content="#0F0A1A">
<title>Selva Narayanan &amp; MohanaSri Wedding 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+Tamil:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;font-size:16px;}
body{background:#0F0A1A;color:#F0EDF8;font-family:'Poppins','Noto Sans Tamil',sans-serif;overflow-x:hidden;line-height:1.6;-webkit-font-smoothing:antialiased;}
img{max-width:100%;display:block;}
a{text-decoration:none;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:#080510;}
::-webkit-scrollbar-thumb{background:linear-gradient(#7C3AED,#E8456A);border-radius:3px;}

/* ===== LANG BUTTON ===== */
#langBtn{position:fixed;top:12px;right:12px;z-index:9999;background:linear-gradient(135deg,#E8456A,#7C3AED);border:none;color:#fff;padding:8px 18px;border-radius:30px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 4px 18px rgba(232,69,106,.45);transition:transform .25s,box-shadow .25s;white-space:nowrap;}
#langBtn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(232,69,106,.55);}
@media(max-width:400px){#langBtn{padding:7px 14px;font-size:11px;top:10px;right:10px;}}

/* ===== PARTICLES ===== */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ===== HERO ===== */
#hero{
  position:relative;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:60px 20px 40px;
  z-index:10;
  overflow:hidden;
  text-align:center;
  gap:0;
}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 90% 70% at 30% 20%,rgba(124,58,237,.22),transparent 60%),radial-gradient(ellipse 80% 60% at 75% 80%,rgba(232,69,106,.2),transparent 55%),radial-gradient(ellipse 60% 50% at 50% 50%,rgba(26,188,176,.08),transparent 70%),#0F0A1A;z-index:0;}

/* spinning bg rings */
.bg-ring{position:absolute;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:bgrspin linear infinite;pointer-events:none;}
.bgr1{width:min(700px,95vw);height:min(700px,95vw);border:1px solid rgba(232,69,106,.09);animation-duration:80s;}
.bgr2{width:min(510px,70vw);height:min(510px,70vw);border:1px dashed rgba(124,58,237,.08);animation-duration:55s;animation-direction:reverse;}
.bgr3{width:min(330px,50vw);height:min(330px,50vw);border:1px solid rgba(26,188,176,.1);animation-duration:35s;}
@keyframes bgrspin{to{transform:translate(-50%,-50%) rotate(360deg);}}

/* ===== MANDALA ===== */
.mandala-wrap{
  position:relative;
  width:min(260px,72vw);
  height:min(260px,72vw);
  margin:0 auto 18px;
  flex-shrink:0;
  z-index:2;
}
/* ring layers */
.mr{position:absolute;border-radius:50%;inset:0;animation:mrspin linear infinite;}
.mr1{border:2px solid rgba(232,69,106,.55);animation-duration:8s;}
.mr2{inset:calc(min(260px,72vw)*0.08);border:2px dashed rgba(124,58,237,.5);animation-duration:6s;animation-direction:reverse;}
.mr3{inset:calc(min(260px,72vw)*0.16);border:2px solid rgba(26,188,176,.55);animation-duration:4.5s;}
.mr4{inset:calc(min(260px,72vw)*0.25);border:1.5px dashed rgba(245,158,11,.5);animation-duration:10s;}
@keyframes mrspin{to{transform:rotate(360deg);}}

/* orbit dots */
.od{position:absolute;border-radius:50%;top:50%;left:50%;transform-origin:0 0;}
.od1,.od2,.od3,.od4{width:10px;height:10px;margin:-5px;}
.od1{background:#E8456A;box-shadow:0 0 12px #E8456A,0 0 24px rgba(232,69,106,.5);animation:od1a 3.5s linear infinite;}
.od2{background:#1ABCB0;box-shadow:0 0 12px #1ABCB0,0 0 24px rgba(26,188,176,.5);animation:od2a 5s linear infinite;}
.od3{background:#F59E0B;box-shadow:0 0 12px #F59E0B,0 0 24px rgba(245,158,11,.5);animation:od3a 4s linear infinite;width:8px;height:8px;margin:-4px;}
.od4{background:#A78BFA;box-shadow:0 0 12px #A78BFA,0 0 24px rgba(167,139,250,.5);animation:od4a 6s linear infinite;width:8px;height:8px;margin:-4px;}

/* dot orbit radii = 48% 40% 32% of wrap width */
@keyframes od1a{0%{transform:rotate(0deg) translateX(calc(min(260px,72vw)*0.46)) rotate(0deg);}100%{transform:rotate(360deg) translateX(calc(min(260px,72vw)*0.46)) rotate(-360deg);}}
@keyframes od2a{0%{transform:rotate(90deg) translateX(calc(min(260px,72vw)*0.38)) rotate(-90deg);}100%{transform:rotate(450deg) translateX(calc(min(260px,72vw)*0.38)) rotate(-450deg);}}
@keyframes od3a{0%{transform:rotate(200deg) translateX(calc(min(260px,72vw)*0.30)) rotate(-200deg);}100%{transform:rotate(560deg) translateX(calc(min(260px,72vw)*0.30)) rotate(-560deg);}}
@keyframes od4a{0%{transform:rotate(310deg) translateX(calc(min(260px,72vw)*0.46)) rotate(-310deg);}100%{transform:rotate(670deg) translateX(calc(min(260px,72vw)*0.46)) rotate(-670deg);}}

/* petals */
.mp{position:absolute;animation:mpfa 3s ease-in-out infinite;font-size:clamp(12px,3vw,16px);}
.mp1{top:0;left:50%;transform:translateX(-50%);color:#FF7096;animation-delay:0s;}
.mp2{top:15%;right:0;color:#FCD34D;animation-delay:.5s;}
.mp3{bottom:15%;right:0;color:#4FD6CC;animation-delay:1s;}
.mp4{bottom:0;left:50%;transform:translateX(-50%);color:#A78BFA;animation-delay:1.5s;}
.mp5{bottom:15%;left:0;color:#FF7096;animation-delay:2s;}
.mp6{top:15%;left:0;color:#FCD34D;animation-delay:2.5s;}
@keyframes mpfa{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-7px) scale(1.25);}}
.mp1,.mp4{transform-origin:50% 50%;}

/* core */
.mcore{
  position:absolute;
  inset:calc(min(260px,72vw)*0.32);
  border-radius:50%;
  background:linear-gradient(135deg,rgba(124,58,237,.35),rgba(232,69,106,.22),rgba(26,188,176,.22));
  border:2px solid rgba(255,255,255,.18);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  animation:corepulse 2.5s ease-in-out infinite;
  box-shadow:0 0 30px rgba(124,58,237,.3),0 0 60px rgba(232,69,106,.1);
}
@keyframes corepulse{
  0%,100%{box-shadow:0 0 25px rgba(124,58,237,.25),0 0 50px rgba(232,69,106,.08);}
  50%{box-shadow:0 0 50px rgba(124,58,237,.5),0 0 90px rgba(232,69,106,.18),0 0 120px rgba(26,188,176,.1);}
}
.mcore-txt{font-size:clamp(16px,4.5vw,24px);color:#FCD34D;font-weight:700;line-height:1;font-family:'Noto Sans Tamil',serif;}
.mcore-sub{font-size:clamp(10px,2.5vw,14px);}

/* rotating text ring around mandala */
.mtext-ring{position:absolute;inset:-8px;animation:mrspin 20s linear infinite;}
.mtext-ring svg{width:100%;height:100%;}

/* ===== HERO CONTENT ===== */
.hero-badge{
  display:inline-block;
  background:linear-gradient(135deg,rgba(232,69,106,.22),rgba(124,58,237,.22));
  border:1px solid rgba(255,255,255,.18);
  border-radius:30px;padding:5px 18px;
  font-size:clamp(9px,2.5vw,11px);font-weight:500;letter-spacing:3px;
  color:#FF7096;text-transform:uppercase;
  margin-bottom:14px;z-index:2;position:relative;
}
.hero-title{
  font-family:'Playfair Display','Noto Sans Tamil',serif;
  font-size:clamp(20px,5.5vw,54px);
  font-weight:900;line-height:1.2;
  background:linear-gradient(135deg,#fff 0%,#FF7096 35%,#FCD34D 65%,#4FD6CC 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  max-width:min(720px,90vw);
  margin:0 auto;
  z-index:2;position:relative;
}
.hero-heart{display:inline-block;-webkit-text-fill-color:initial;animation:hbeat 1.4s ease-in-out infinite;font-style:normal;}
@keyframes hbeat{0%,100%{transform:scale(1);}50%{transform:scale(1.35);}}
.hero-sub{
  font-size:clamp(10px,2.8vw,13px);letter-spacing:3px;
  color:rgba(240,237,248,.5);margin-top:8px;
  z-index:2;position:relative;
}
.hero-pill{
  display:inline-flex;align-items:center;gap:8px;margin-top:18px;
  background:linear-gradient(135deg,rgba(26,188,176,.18),rgba(245,158,11,.15));
  border:1px solid rgba(26,188,176,.35);
  border-radius:40px;padding:10px 22px;
  font-size:clamp(12px,3vw,15px);font-weight:600;color:#4FD6CC;
  z-index:2;position:relative;
}

/* ===== COUPLE SHOWCASE ===== */
.showcase{
  display:flex;align-items:center;justify-content:center;
  gap:clamp(12px,4vw,40px);flex-wrap:wrap;
  max-width:900px;margin:0 auto;
}
.sc-card{
  position:relative;overflow:hidden;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:28px 22px;
  min-width:0;width:min(260px,42vw);
  flex-shrink:0;text-align:center;
  transition:transform .4s,box-shadow .4s;
}
@media(max-width:480px){.sc-card{width:calc(50% - 8px);padding:20px 14px;border-radius:16px;}}
@media(max-width:360px){.sc-card{width:100%;max-width:260px;}}
.sc-card:hover{transform:translateY(-7px);box-shadow:0 18px 48px rgba(0,0,0,.45);}
.sc-g{border-top:3px solid #1ABCB0;}
.sc-g:hover{box-shadow:0 18px 48px rgba(26,188,176,.22);}
.sc-b{border-top:3px solid #E8456A;}
.sc-b:hover{box-shadow:0 18px 48px rgba(232,69,106,.22);}
.sc-glow{position:absolute;width:130px;height:130px;border-radius:50%;top:-35px;left:50%;transform:translateX(-50%);filter:blur(45px);opacity:.15;pointer-events:none;}
.sc-emoji{font-size:clamp(38px,10vw,62px);margin-bottom:10px;display:block;animation:emf 3.5s ease-in-out infinite;}
.sc-b .sc-emoji{animation-delay:-1.8s;}
@keyframes emf{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-9px) rotate(3deg);}}
.sc-role{display:block;font-size:clamp(8px,2vw,10px);font-weight:600;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
.sc-g .sc-role{color:#4FD6CC;} .sc-b .sc-role{color:#FF7096;}
.sc-name{font-family:'Playfair Display','Noto Sans Tamil',serif;font-size:clamp(14px,3.5vw,20px);font-weight:700;color:#fff;line-height:1.2;margin-bottom:5px;}
.sc-qual{font-size:clamp(10px,2.5vw,12px);color:#FCD34D;margin-bottom:12px;}
.sc-line{height:2px;border-radius:2px;margin:0 auto 10px;width:40px;}
.sc-det{font-size:clamp(10px,2.5vw,12px);color:rgba(240,237,248,.5);}
/* heart connector */
.hconn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:10px 0;flex-shrink:0;}
.hw{position:relative;display:flex;align-items:center;justify-content:center;width:70px;height:70px;}
.bh{font-size:clamp(30px,8vw,48px);position:relative;z-index:2;animation:bha 1.6s ease-in-out infinite;}
@keyframes bha{0%,100%{transform:scale(1);}50%{transform:scale(1.22);}}
.rpl{position:absolute;border-radius:50%;border:2px solid rgba(232,69,106,.35);animation:rpa 2s ease-out infinite;}
.rp1{width:44px;height:44px;} .rp2{width:60px;height:60px;animation-delay:.6s;} .rp3{width:76px;height:76px;animation-delay:1.2s;}
@keyframes rpa{0%{transform:scale(.5);opacity:1;}100%{transform:scale(2.2);opacity:0;}}
.hc-lbl{font-size:clamp(8px,2vw,11px);font-weight:600;letter-spacing:3px;color:rgba(240,237,248,.4);text-transform:uppercase;}
.hc-date{font-family:'Playfair Display',serif;font-size:clamp(13px,3vw,17px);font-weight:700;color:#FCD34D;}

/* ===== SECTIONS ===== */
.sec{position:relative;z-index:10;padding:clamp(48px,8vw,80px) clamp(16px,5vw,40px);}
.sec-alt{background:linear-gradient(180deg,transparent,rgba(124,58,237,.05),transparent);}
.sec-head{text-align:center;margin-bottom:clamp(28px,5vw,44px);}
.sec-eye{display:block;font-size:clamp(9px,2.2vw,11px);font-weight:600;letter-spacing:4px;text-transform:uppercase;margin-bottom:8px;}
.sec-title{font-family:'Playfair Display','Noto Sans Tamil',serif;font-size:clamp(22px,5vw,40px);font-weight:700;color:#fff;margin-bottom:12px;}
.sec-divline{display:flex;align-items:center;justify-content:center;gap:10px;}
.sec-divline .dl{width:clamp(30px,6vw,55px);height:2px;border-radius:2px;}
.sec-divline .di{font-size:14px;}

/* ===== COUNTDOWN ===== */
.cd-grid{display:flex;justify-content:center;gap:clamp(8px,3vw,24px);flex-wrap:wrap;}
.cd-unit{display:flex;flex-direction:column;align-items:center;gap:8px;}
.cd-box{
  width:clamp(64px,16vw,106px);height:clamp(72px,18vw,116px);
  perspective:900px;
}
.cd-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;}
.cd-face{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;
  font-size:clamp(26px,7vw,48px);font-weight:900;color:#fff;
  background:linear-gradient(160deg,rgba(124,58,237,.42),rgba(232,69,106,.28),rgba(15,10,26,.96));
  border:1px solid rgba(255,255,255,.16);border-radius:12px;overflow:hidden;
  box-shadow:0 8px 30px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.1);
}
.cd-face::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.07);}
.cd-flip .cd-inner{animation:cdf .42s ease-in-out;}
@keyframes cdf{0%{transform:rotateX(0);}50%{transform:rotateX(-90deg);}100%{transform:rotateX(0);}}
.cd-lbl{font-size:clamp(8px,2vw,11px);font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(240,237,248,.45);}
.cd-sub{margin-top:24px;text-align:center;font-family:'Playfair Display',serif;font-size:clamp(13px,3vw,19px);font-style:italic;color:#4FD6CC;opacity:0;transition:opacity .8s;}
.cd-sub.vis{opacity:1;}

/* ===== SCRATCH ===== */
.s-outer{max-width:min(420px,90vw);margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:14px;}
.s-hint{font-size:clamp(12px,3vw,14px);color:rgba(240,237,248,.5);font-style:italic;text-align:center;}
.s-stage{position:relative;width:100%;border-radius:16px;overflow:hidden;box-shadow:0 0 40px rgba(245,158,11,.18),0 0 0 1px rgba(245,158,11,.2);}
.s-reveal{width:100%;height:clamp(160px,42vw,200px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#1a0a2e,#0e1a2e,#0a1a18);padding:20px;}
.s-cvr{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:16px;overflow:hidden;cursor:crosshair;}
#sCanvas{display:block;width:100%;height:100%;touch-action:none;}
.rev-date{font-family:'Playfair Display',serif;font-size:clamp(24px,7vw,40px);font-weight:900;background:linear-gradient(135deg,#4FD6CC,#FCD34D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px;}
.rev-day{font-size:clamp(12px,3vw,15px);font-weight:600;color:#fff;letter-spacing:1px;}
.rev-place{font-size:clamp(9px,2.5vw,12px);color:rgba(240,237,248,.5);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
.s-bar{width:100%;height:4px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden;}
.s-fill{height:100%;width:0%;border-radius:4px;background:linear-gradient(90deg,#1ABCB0,#F59E0B,#E8456A);transition:width .1s;}
.s-msg{font-size:clamp(12px,3vw,14px);font-weight:500;color:#4FD6CC;text-align:center;min-height:20px;opacity:0;transition:opacity .5s;}
.s-msg.show{opacity:1;}
.s-reset{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(240,237,248,.5);padding:6px 20px;border-radius:20px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .3s;}
.s-reset:hover{border-color:#1ABCB0;color:#4FD6CC;}

/* ===== INFO CARDS ===== */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(240px,100%),1fr));gap:16px;max-width:820px;margin:0 auto;}
.ic{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:clamp(22px,4vw,30px) clamp(18px,4vw,26px);transition:transform .4s,box-shadow .4s;}
.ic:hover{transform:translateY(-5px);box-shadow:0 18px 48px rgba(0,0,0,.4);}
.ic-g{border-top:3px solid #1ABCB0;} .ic-b{border-top:3px solid #E8456A;}
.ic-role{font-size:clamp(9px,2vw,11px);font-weight:600;letter-spacing:3px;text-transform:uppercase;margin-bottom:9px;display:block;}
.ic-g .ic-role{color:#4FD6CC;} .ic-b .ic-role{color:#FF7096;}
.ic-name{font-family:'Playfair Display','Noto Sans Tamil',serif;font-size:clamp(17px,4vw,24px);font-weight:700;color:#fff;margin-bottom:5px;}
.ic-qual{font-size:clamp(11px,2.5vw,13px);color:#FCD34D;margin-bottom:11px;}
.ic-row{font-size:clamp(11px,2.5vw,13px);color:rgba(240,237,248,.55);line-height:1.85;}
.ic-row strong{color:#F0EDF8;font-weight:600;}

/* ===== TIMELINE ===== */
.tl{max-width:600px;margin:0 auto;position:relative;}
.tl::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,#7C3AED 20%,#E8456A 50%,#1ABCB0 80%,transparent);transform:translateX(-50%);}
@media(max-width:480px){
  .tl::before{left:14px;transform:none;}
  .tl-row{display:flex;flex-direction:row;gap:12px;align-items:flex-start;padding-left:34px;}
  .tl-row .tl-dot{flex-shrink:0;position:absolute;left:8px;top:6px;}
  .tl-row .tl-l-content,.tl-row .tl-r-content{text-align:left!important;}
  .tl-gap{display:none;}
}
.tl-day{margin-bottom:44px;}
.tl-head{text-align:center;margin-bottom:24px;}
.tl-chip{display:inline-block;background:linear-gradient(135deg,#7C3AED,#E8456A);border-radius:30px;padding:7px 22px;font-size:clamp(11px,2.5vw,13px);font-weight:700;color:#fff;box-shadow:0 4px 18px rgba(124,58,237,.35);}
.tl-items{display:flex;flex-direction:column;gap:14px;}
.tl-row{display:grid;grid-template-columns:1fr 24px 1fr;align-items:center;gap:14px;position:relative;}
.tl-dot{width:12px;height:12px;border-radius:50%;margin:0 auto;flex-shrink:0;}
.dc-r{background:#E8456A;box-shadow:0 0 10px #E8456A;} .dc-t{background:#1ABCB0;box-shadow:0 0 10px #1ABCB0;} .dc-a{background:#F59E0B;box-shadow:0 0 10px #F59E0B;}
.tl-ev{font-size:clamp(12px,3vw,15px);font-weight:600;color:#fff;line-height:1.35;}
.tl-tm{font-size:clamp(10px,2.2vw,12px);color:rgba(240,237,248,.5);}
.tl-l .tl-ev,.tl-l .tl-tm{text-align:right;}
.tl-r .tl-ev,.tl-r .tl-tm{grid-column:3;text-align:left;}
.tl-r .tl-dot{grid-column:2;} .tl-r .tl-gap{grid-column:1;}

/* ===== VENUE ===== */
.ven-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(240px,100%),1fr));gap:16px;max-width:820px;margin:0 auto;}
.vc{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:clamp(22px,4vw,30px) clamp(18px,4vw,26px);text-align:center;transition:transform .4s,box-shadow .4s;}
.vc:hover{transform:translateY(-5px);box-shadow:0 18px 44px rgba(0,0,0,.4);}
.vc-t{border-top:3px solid #1ABCB0;} .vc-r{border-top:3px solid #E8456A;}
.vc-num{font-family:'Playfair Display',serif;font-size:clamp(36px,10vw,52px);font-weight:900;line-height:1;margin-bottom:5px;opacity:.12;}
.vc-t .vc-num{color:#1ABCB0;} .vc-r .vc-num{color:#E8456A;}
.vc-lbl{font-size:clamp(9px,2.2vw,11px);font-weight:600;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;display:block;}
.vc-t .vc-lbl{color:#4FD6CC;} .vc-r .vc-lbl{color:#FF7096;}
.vc-name{font-family:'Playfair Display','Noto Sans Tamil',serif;font-size:clamp(14px,3.5vw,19px);font-weight:700;color:#fff;line-height:1.35;margin-bottom:9px;}
.vc-addr{font-size:clamp(11px,2.5vw,13px);color:rgba(240,237,248,.45);line-height:1.75;margin-bottom:16px;}

.ft-names{font-size:clamp(11px,2.5vw,13px);color:rgba(240,237,248,.28);letter-spacing:2px;margin-top:20px;}

/* ===== SCROLL ANIMATIONS ===== */
.aup{opacity:0;transform:translateY(40px);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1);}
.aleft{opacity:0;transform:translateX(-50px);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1);}
.aright{opacity:0;transform:translateX(50px);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1);}
.asc{opacity:0;transform:scale(.9);transition:opacity .85s cubic-bezier(.16,1,.3,1),transform .85s cubic-bezier(.16,1,.3,1);}
.aup.v,.aleft.v,.aright.v,.asc.v{opacity:1;transform:none;}
.d1{transition-delay:.1s;} .d2{transition-delay:.2s;} .d3{transition-delay:.3s;}
</style>
</head>

<script>
// ── PARTICLES ──
var pc=document.getElementById('particles'),pcx=pc.getContext('2d'),PW,PH,ptls=[];
var CL=['232,69,106','26,188,176','245,158,11','124,58,237','255,112,150','79,214,204'];
function rP(){PW=pc.width=window.innerWidth;PH=pc.height=window.innerHeight;}
rP();window.addEventListener('resize',rP);
function nP(){return{x:Math.random()*PW,y:PH+6,sz:Math.random()*1.8+.4,vy:-(Math.random()*.6+.2),vx:(Math.random()-.5)*.3,op:Math.random()*.5+.1,dc:Math.random()*.0015+.0006,c:CL[Math.floor(Math.random()*CL.length)]};}
for(var i=0;i<70;i++){var q=nP();q.y=Math.random()*PH;ptls.push(q);}
function dP(){pcx.clearRect(0,0,PW,PH);for(var i=0;i<ptls.length;i++){var p=ptls[i];p.y+=p.vy;p.x+=p.vx;p.op-=p.dc;pcx.beginPath();pcx.arc(p.x,p.y,p.sz,0,Math.PI*2);pcx.fillStyle='rgba('+p.c+','+p.op+')';pcx.fill();if(p.op<=0||p.y<-6)ptls[i]=nP();}requestAnimationFrame(dP);}
dP();

// ── COUNTDOWN ──
var WD=new Date('2026-06-24T06:00:00');
function pad(n){return String(n).padStart(2,'0');}
function flip(bid,fid,val){var f=document.getElementById(fid),b=document.getElementById(bid);if(!f||!b||f.textContent===val)return;f.textContent=val;var inn=b.querySelector('.cd-inner');inn.classList.remove('cd-flip');void inn.offsetWidth;inn.classList.add('cd-flip');}
function tick(){var diff=WD-new Date(),s=document.getElementById('cdSub');if(s)s.classList.add('vis');if(diff<=0)return;flip('fcD','dd',pad(Math.floor(diff/86400000)));flip('fcH','hh',pad(Math.floor((diff%86400000)/3600000)));flip('fcM','mm',pad(Math.floor((diff%3600000)/60000)));flip('fcS','ss',pad(Math.floor((diff%60000)/1000)));}
tick();setInterval(tick,1000);

// ── SCRATCH ──
var sc=document.getElementById('sCanvas'),sx=sc.getContext('2d'),sw=sc.parentElement,son=false,sdone=false;
function initScratch(){
  sc.width=sw.offsetWidth;sc.height=sw.offsetHeight||180;
  sdone=false;
  var f=document.getElementById('sFill');if(f)f.style.width='0%';
  var m=document.getElementById('sMsg');if(m)m.classList.remove('show');
  var g=sx.createLinearGradient(0,0,sc.width,sc.height);
  g.addColorStop(0,'#7A5800');g.addColorStop(.2,'#C9940A');g.addColorStop(.5,'#F0C040');g.addColorStop(.8,'#C9940A');g.addColorStop(1,'#7A5800');
  sx.fillStyle=g;sx.fillRect(0,0,sc.width,sc.height);
  for(var i=0;i<160;i++){sx.beginPath();sx.arc(Math.random()*sc.width,Math.random()*sc.height,Math.random()*2.5+.5,0,Math.PI*2);sx.fillStyle='rgba(255,255,255,'+(Math.random()*.2)+')';sx.fill();}
  sx.save();sx.fillStyle='rgba(70,40,0,.78)';sx.textAlign='center';sx.textBaseline='middle';
  var isTa=(document.documentElement.lang==='ta');
  sx.font='bold '+Math.min(sc.width*.044,16)+'px Poppins,sans-serif';
  sx.fillText(isTa?'\u2756 \u0BA4\u0BC7\u0BAF\u0BCD\u0B95\u0BCD\u0B95\u0BB5\u0BC1\u0BAE\u0BCD \u2756':'\u2756 Scratch Here \u2756',sc.width/2,sc.height/2-8);
  sx.font=Math.min(sc.width*.032,12)+'px Poppins,sans-serif';
  sx.fillStyle='rgba(70,40,0,.5)';
  sx.fillText(isTa?'\u0BB5\u0BBF\u0BB0\u0BB2\u0BBE\u0BB2\u0BCD \u0BA4\u0BC7\u0BAF\u0BCD\u0B95\u0BCD\u0B95\u0BB5\u0BC1\u0BAE\u0BCD':'Use your finger or mouse',sc.width/2,sc.height/2+13);
  sx.restore();
}
window.addEventListener('resize',function(){setTimeout(initScratch,100);});
setTimeout(initScratch,300);
function doS(x,y){sx.globalCompositeOperation='destination-out';sx.beginPath();sx.arc(x,y,Math.max(28,sc.width*.07),0,Math.PI*2);sx.fill();sx.globalCompositeOperation='source-over';if(!sdone)chkS();}
function chkS(){var d=sx.getImageData(0,0,sc.width,sc.height).data,t=0;for(var i=3;i<d.length;i+=4)if(d[i]<128)t++;var p=Math.min(t/(sc.width*sc.height)*100,100);var f=document.getElementById('sFill');if(f)f.style.width=p+'%';if(p>42){sdone=true;sx.clearRect(0,0,sc.width,sc.height);var m=document.getElementById('sMsg');if(m)m.classList.add('show');for(var j=0;j<25;j++)ptls.push({x:window.innerWidth/2+(Math.random()-.5)*300,y:window.innerHeight*.6+(Math.random()-.5)*200,sz:Math.random()*3+1,vy:-(Math.random()*3+1),vx:(Math.random()-.5)*5,op:1,dc:.022,c:CL[j%CL.length]});}}
function gp(e){var r=sc.getBoundingClientRect();if(e.touches)return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};return{x:e.clientX-r.left,y:e.clientY-r.top};}
sc.addEventListener('mousedown',function(e){son=true;var p=gp(e);doS(p.x,p.y);});
sc.addEventListener('mousemove',function(e){if(son){var p=gp(e);doS(p.x,p.y);}});
document.addEventListener('mouseup',function(){son=false;});
sc.addEventListener('touchstart',function(e){e.preventDefault();son=true;var p=gp(e);doS(p.x,p.y);},{passive:false});
sc.addEventListener('touchmove',function(e){e.preventDefault();if(son){var p=gp(e);doS(p.x,p.y);}},{passive:false});
document.addEventListener('touchend',function(){son=false;});
